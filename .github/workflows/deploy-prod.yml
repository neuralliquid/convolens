name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: '1.14.7'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: '0'
  ENVIRONMENT: prod
  ARM_USE_OIDC: 'true'
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    name: Deploy Convolens Production
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '24'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Verify Azure OIDC Configuration
        run: |
          set -euo pipefail
          for v in "$ARM_CLIENT_ID" "$ARM_TENANT_ID" "$ARM_SUBSCRIPTION_ID"; do
            if [ -z "$v" ]; then
              echo "Error: AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID repository variables are required for OIDC deploys." >&2
              exit 1
            fi
          done

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile --reporter=append-only
        env:
          CI: 'true'
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Build API and Web
        timeout-minutes: 15
        run: pnpm run build
        env:
          CI: 'true'
          NEXT_PUBLIC_API_URL: https://placeholder.invalid/api
          NEXT_PUBLIC_API_BASE_URL: https://placeholder.invalid

      - name: Ensure Terraform Backend
        run: |
          set -euo pipefail
          TFSTATE_RG_LOCATION=$(az group show \
            --name nl-tfstate-rg \
            --query location \
            -o tsv 2>/dev/null || true)
          if [ -z "$TFSTATE_RG_LOCATION" ]; then
            TFSTATE_RG_LOCATION=southafricanorth
            az group create \
              --name nl-tfstate-rg \
              --location "$TFSTATE_RG_LOCATION" \
              --tags project=convolens purpose=tfstate environment=prod
          fi
          if ! az storage account show \
            --resource-group nl-tfstate-rg \
            --name nltfstateconvolens \
            --only-show-errors >/dev/null 2>&1; then
            az storage account create \
            --resource-group nl-tfstate-rg \
            --name nltfstateconvolens \
              --location "$TFSTATE_RG_LOCATION" \
              --sku Standard_LRS \
              --kind StorageV2 \
              --min-tls-version TLS1_2 \
              --allow-blob-public-access false \
              --https-only true \
              --tags project=convolens purpose=tfstate environment=prod
          fi
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group nl-tfstate-rg \
            --account-name nltfstateconvolens \
            --query '[0].value' \
            -o tsv)
          az storage container create \
            --name tfstate \
            --account-name nltfstateconvolens \
            --account-key "$ACCOUNT_KEY"

      - name: Terraform Init
        run: terraform -chdir=infra/terraform/env/prod init -backend-config=backend.hcl

      - name: Resolve Base API Runtime
        id: base-api
        run: |
          DEFAULT_IMAGE="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          DEFAULT_PORT="80"
          CURRENT_IMAGE=$(az containerapp show \
            --resource-group nl-prod-convolens-rg \
            --name nl-prod-convolens-api \
            --query 'properties.template.containers[0].image' \
            -o tsv 2>/dev/null || true)
          CURRENT_PORT=$(az containerapp show \
            --resource-group nl-prod-convolens-rg \
            --name nl-prod-convolens-api \
            --query 'properties.configuration.ingress.targetPort' \
            -o tsv 2>/dev/null || true)
          if [ -z "$CURRENT_IMAGE" ]; then
            CURRENT_IMAGE="$DEFAULT_IMAGE"
          fi
          if [ "$CURRENT_IMAGE" = "$DEFAULT_IMAGE" ] || [ -z "$CURRENT_PORT" ]; then
            CURRENT_PORT="$DEFAULT_PORT"
          fi
          echo "image=$CURRENT_IMAGE" >> "$GITHUB_OUTPUT"
          echo "target-port=$CURRENT_PORT" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply Base Infrastructure
        env:
          TF_VAR_mystira_identity_client_id: ${{ secrets.MYSTIRA_IDENTITY_CLIENT_ID }}
        run: |
          terraform -chdir=infra/terraform/env/prod apply \
            -auto-approve \
            -var "container_image_api=${{ steps.base-api.outputs.image }}" \
            -var "api_target_port=${{ steps.base-api.outputs.target-port }}"

      - name: Capture Terraform Outputs
        id: tf
        run: |
          terraform -chdir=infra/terraform/env/prod output -json > tf-outputs.json
          echo "resource-group=$(jq -r '.resource_group_name.value' tf-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "api-url=$(jq -r '.container_app_url.value' tf-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "web-url=$(jq -r '.frontend_default_hostname.value' tf-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "web-name=nl-prod-convolens-web" >> "$GITHUB_OUTPUT"
          ACR_LOGIN_SERVER=$(jq -r '.container_registry_login_server.value' tf-outputs.json)
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "ACR output is empty; enable_container_registry must be true for production deploy." >&2
            exit 1
          fi
          echo "acr-login-server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "acr-name=${ACR_LOGIN_SERVER%%.azurecr.io}" >> "$GITHUB_OUTPUT"

      - name: Build and Push API Image
        id: api-image
        run: |
          IMAGE="${{ steps.tf.outputs.acr-login-server }}/convolens-api:${{ github.sha }}"
          az acr build \
            --registry "${{ steps.tf.outputs.acr-name }}" \
            --image "convolens-api:${{ github.sha }}" \
            --file apps/api/Dockerfile \
            .
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply API Image
        run: |
          terraform -chdir=infra/terraform/env/prod apply \
            -auto-approve \
            -var "container_image_api=${{ steps.api-image.outputs.image }}" \
            -var "api_target_port=3001"
        env:
          TF_VAR_mystira_identity_client_id: ${{ secrets.MYSTIRA_IDENTITY_CLIENT_ID }}

      - name: Rebuild Web With Production API URL
        timeout-minutes: 15
        run: pnpm --filter @convolens/web... build
        env:
          CI: 'true'
          NEXT_PUBLIC_API_URL: ${{ steps.tf.outputs.api-url }}/api
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.tf.outputs.api-url }}

      - name: Package Web Standalone
        run: |
          rm -rf deploy-web web.zip
          mkdir -p deploy-web
          cp -R apps/web/.next/standalone/. deploy-web/
          mkdir -p deploy-web/apps/web/.next/static
          cp -R apps/web/.next/static/. deploy-web/apps/web/.next/static/
          if [ -d apps/web/public ]; then
            mkdir -p deploy-web/apps/web/public
            cp -R apps/web/public/. deploy-web/apps/web/public/
          fi
          while find deploy-web -type l -print -quit | grep -q .; do
            find deploy-web -type l -print0 | while IFS= read -r -d '' link; do
              target=$(readlink -f "$link" || true)
              rm "$link"
              if [ -n "$target" ] && [ -e "$target" ]; then
                cp -R "$target" "$link"
              fi
            done
          done
          for package in @next/env @swc/helpers baseline-browser-mapping caniuse-lite postcss styled-jsx; do
            package_dir="$(node -e "const fs = require('fs'); const path = require('path'); const nextPackage = require.resolve('next/package.json', { paths: [process.cwd() + '/apps/web'] }); const nextModules = path.dirname(nextPackage).replace(/[\\/]next$/, ''); const entry = require.resolve(process.argv[1], { paths: [nextModules, process.cwd() + '/apps/web'] }); let dir = path.dirname(entry); while (!fs.existsSync(path.join(dir, 'package.json'))) { const parent = path.dirname(dir); if (parent === dir) throw new Error('package root not found'); dir = parent; } process.stdout.write(dir)" "$package")"
            mkdir -p "deploy-web/apps/web/node_modules/$(dirname "$package")"
            rm -rf "deploy-web/apps/web/node_modules/$package"
            cp -R "$package_dir" "deploy-web/apps/web/node_modules/$package"
          done
          cd deploy-web
          zip -r ../web.zip .

      - name: Deploy Web App
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          MYSTIRA_IDENTITY_CLIENT_SECRET: ${{ secrets.MYSTIRA_IDENTITY_CLIENT_SECRET }}
        run: |
          SETTINGS=()
          if [ -n "$NEXTAUTH_SECRET" ]; then
            SETTINGS+=(NEXTAUTH_SECRET="$NEXTAUTH_SECRET")
          fi
          if [ -n "$MYSTIRA_IDENTITY_CLIENT_SECRET" ]; then
            SETTINGS+=(MYSTIRA_IDENTITY_CLIENT_SECRET="$MYSTIRA_IDENTITY_CLIENT_SECRET")
          fi
          if [ "${#SETTINGS[@]}" -gt 0 ]; then
            az webapp config appsettings set \
              --resource-group "${{ steps.tf.outputs.resource-group }}" \
              --name "${{ steps.tf.outputs.web-name }}" \
              --settings "${SETTINGS[@]}"
          fi
          az webapp config appsettings set \
            --resource-group "${{ steps.tf.outputs.resource-group }}" \
            --name "${{ steps.tf.outputs.web-name }}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=1
          az webapp deploy \
            --resource-group "${{ steps.tf.outputs.resource-group }}" \
            --name "${{ steps.tf.outputs.web-name }}" \
            --src-path web.zip \
            --type zip

      - name: Smoke Test
        run: |
          curl -fsS --max-time 30 "${{ steps.tf.outputs.api-url }}/health"
          curl -fsSI --max-time 30 "${{ steps.tf.outputs.web-url }}"
