name: Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - validate
          - plan
          - apply

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.14.7'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: '0'
  ARM_USE_OIDC: 'true'

jobs:
  # =============================================================================
  # Validate Terraform
  # =============================================================================
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform -chdir=infra/terraform/env/dev fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform -chdir=infra/terraform/env/dev init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform/env/dev validate

  # =============================================================================
  # Plan Changes (PR preview / workflow_dispatch=plan)
  # =============================================================================
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', github.event.inputs.environment)) || fromJson('["dev"]') }}
    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Parse Azure Credentials
        id: azure-creds
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail
          CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientId')
          TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.tenantId')
          SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.subscriptionId')
          for v in "$CLIENT_ID" "$TENANT_ID" "$SUBSCRIPTION_ID"; do
            if [ "$v" = "null" ] || [ -z "$v" ]; then
              echo "Error: AZURE_CREDENTIALS missing clientId/tenantId/subscriptionId" >&2
              exit 1
            fi
          done
          echo "client-id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "tenant-id=$TENANT_ID" >> "$GITHUB_OUTPUT"
          echo "subscription-id=$SUBSCRIPTION_ID" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1.6.1
        with:
          client-id: ${{ steps.azure-creds.outputs.client-id }}
          tenant-id: ${{ steps.azure-creds.outputs.tenant-id }}
          subscription-id: ${{ steps.azure-creds.outputs.subscription-id }}

      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ steps.azure-creds.outputs.client-id }}
          ARM_TENANT_ID: ${{ steps.azure-creds.outputs.tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ steps.azure-creds.outputs.subscription-id }}
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ steps.azure-creds.outputs.client-id }}
          ARM_TENANT_ID: ${{ steps.azure-creds.outputs.tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ steps.azure-creds.outputs.subscription-id }}
        run: |
          terraform -chdir=infra/terraform/env/${{ matrix.environment }} plan -no-color -out=tfplan | tee plan-output.txt
          {
            echo "plan<<EOF"
            cat plan-output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.plan }}
        with:
          script: |
            const planOutput = process.env.PLAN_OUTPUT || '';
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n[…output truncated…]'
              : planOutput;
            const body = `### Terraform Plan (\`${{ matrix.environment }}\`)\n\n<details>\n<summary>Click to expand</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>\n\n*Run ID: ${{ github.run_id }}*`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # =============================================================================
  # Apply (push to main / workflow_dispatch=apply)
  # =============================================================================
  apply:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', github.event.inputs.environment)) || fromJson('["dev"]') }}
      max-parallel: 1
    environment: ${{ matrix.environment }}
    outputs:
      container_app_url: ${{ steps.outputs.outputs.container_app_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Parse Azure Credentials
        id: azure-creds
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail
          CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientId')
          TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.tenantId')
          SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.subscriptionId')
          for v in "$CLIENT_ID" "$TENANT_ID" "$SUBSCRIPTION_ID"; do
            if [ "$v" = "null" ] || [ -z "$v" ]; then
              echo "Error: AZURE_CREDENTIALS missing clientId/tenantId/subscriptionId" >&2
              exit 1
            fi
          done
          echo "client-id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "tenant-id=$TENANT_ID" >> "$GITHUB_OUTPUT"
          echo "subscription-id=$SUBSCRIPTION_ID" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1.6.1
        with:
          client-id: ${{ steps.azure-creds.outputs.client-id }}
          tenant-id: ${{ steps.azure-creds.outputs.tenant-id }}
          subscription-id: ${{ steps.azure-creds.outputs.subscription-id }}

      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ steps.azure-creds.outputs.client-id }}
          ARM_TENANT_ID: ${{ steps.azure-creds.outputs.tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ steps.azure-creds.outputs.subscription-id }}
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID: ${{ steps.azure-creds.outputs.client-id }}
          ARM_TENANT_ID: ${{ steps.azure-creds.outputs.tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ steps.azure-creds.outputs.subscription-id }}
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} apply -auto-approve

      - name: Capture Outputs
        id: outputs
        env:
          ARM_CLIENT_ID: ${{ steps.azure-creds.outputs.client-id }}
          ARM_TENANT_ID: ${{ steps.azure-creds.outputs.tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ steps.azure-creds.outputs.subscription-id }}
        run: |
          terraform -chdir=infra/terraform/env/${{ matrix.environment }} output -json > tf-outputs.json
          CONTAINER_APP_URL=$(jq -r '.container_app_url.value // ""' tf-outputs.json)
          echo "container_app_url=$CONTAINER_APP_URL" >> "$GITHUB_OUTPUT"

      - name: Upload Outputs
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: tf-outputs-${{ matrix.environment }}
          path: infra/terraform/env/${{ matrix.environment }}/tf-outputs.json
          retention-days: 30

  # =============================================================================
  # Post-Apply Health Check
  # =============================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: apply
    if: success() && needs.apply.outputs.container_app_url != ''
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}

    steps:
      - name: Health Check
        run: |
          API_URL="${{ needs.apply.outputs.container_app_url }}"
          echo "Probing $API_URL/health"
          curl -sfS --max-time 10 "$API_URL/health" \
            || echo "API health check failed (placeholder image returns 200 / — non-critical)"

      - name: Notify Success
        run: |
          echo "Apply + verify completed: ${{ needs.apply.outputs.container_app_url }}"
