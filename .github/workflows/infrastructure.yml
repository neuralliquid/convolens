name: Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - validate
          - plan
          - apply

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.14.7'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: '0'
  ARM_USE_OIDC: 'true'
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  # =============================================================================
  # Validate Terraform
  # =============================================================================
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} validate

  # =============================================================================
  # Plan Changes (PR preview / workflow_dispatch=plan)
  # =============================================================================
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', github.event.inputs.environment)) || fromJson('["dev","prod"]') }}
    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Verify Azure OIDC Configuration
        run: |
          set -euo pipefail
          for v in "$ARM_CLIENT_ID" "$ARM_TENANT_ID" "$ARM_SUBSCRIPTION_ID"; do
            if [ -z "$v" ]; then
              echo "Error: AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID repository variables are required for OIDC deploys." >&2
              exit 1
            fi
          done

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=infra/terraform/env/${{ matrix.environment }} plan -no-color -out=tfplan | tee plan-output.txt
          {
            echo "plan<<EOF"
            cat plan-output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.plan }}
        with:
          script: |
            const planOutput = process.env.PLAN_OUTPUT || '';
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n[…output truncated…]'
              : planOutput;
            const body = `### Terraform Plan (\`${{ matrix.environment }}\`)\n\n<details>\n<summary>Click to expand</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>\n\n*Run ID: ${{ github.run_id }}*`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # =============================================================================
  # Apply (push to main / workflow_dispatch=apply)
  # =============================================================================
  apply:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', github.event.inputs.environment)) || fromJson('["dev"]') }}
      max-parallel: 1
    environment: ${{ matrix.environment }}
    outputs:
      container_app_url: ${{ steps.outputs.outputs.container_app_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Verify Azure OIDC Configuration
        run: |
          set -euo pipefail
          for v in "$ARM_CLIENT_ID" "$ARM_TENANT_ID" "$ARM_SUBSCRIPTION_ID"; do
            if [ -z "$v" ]; then
              echo "Error: AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID repository variables are required for OIDC deploys." >&2
              exit 1
            fi
          done

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap Dev Key Vault Access
        id: bootstrap-dev-keyvault
        if: matrix.environment == 'dev'
        run: |
          set -euo pipefail
          DEPLOYER_OBJECT_ID=$(az ad sp show \
            --id "$ARM_CLIENT_ID" \
            --query id \
            -o tsv)
          if [ -z "$DEPLOYER_OBJECT_ID" ]; then
            echo "Error: failed to resolve Azure service principal object ID" >&2
            exit 1
          fi
          az keyvault set-policy \
            --name nl-dev-convolens-kv \
            --object-id "$DEPLOYER_OBJECT_ID" \
            --secret-permissions get list set delete purge recover
          echo "deployer-object-id=$DEPLOYER_OBJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Import Bootstrapped Dev Key Vault Access
        if: matrix.environment == 'dev'
        env:
          DEPLOYER_OBJECT_ID: ${{ steps.bootstrap-dev-keyvault.outputs.deployer-object-id }}
        run: |
          set -euo pipefail
          POLICY_ID="/subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/nl-dev-convolens-rg/providers/Microsoft.KeyVault/vaults/nl-dev-convolens-kv/objectId/$DEPLOYER_OBJECT_ID"
          terraform -chdir=infra/terraform/env/${{ matrix.environment }} state rm azurerm_key_vault_access_policy.deployer || true
          terraform -chdir=infra/terraform/env/${{ matrix.environment }} import -input=false azurerm_key_vault_access_policy.deployer "$POLICY_ID"

      - name: Terraform Apply
        run: terraform -chdir=infra/terraform/env/${{ matrix.environment }} apply -auto-approve

      - name: Capture Outputs
        id: outputs
        run: |
          terraform -chdir=infra/terraform/env/${{ matrix.environment }} output -json > tf-outputs.json
          CONTAINER_APP_URL=$(jq -r '.container_app_url.value // ""' tf-outputs.json)
          echo "container_app_url=$CONTAINER_APP_URL" >> "$GITHUB_OUTPUT"

      - name: Upload Outputs
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: tf-outputs-${{ matrix.environment }}
          path: infra/terraform/env/${{ matrix.environment }}/tf-outputs.json
          retention-days: 30

  # =============================================================================
  # Post-Apply Health Check
  # =============================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: apply
    if: success() && needs.apply.outputs.container_app_url != ''
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}

    steps:
      - name: Health Check
        run: |
          API_URL="${{ needs.apply.outputs.container_app_url }}"
          echo "Probing $API_URL/health"
          curl -sfS --max-time 10 "$API_URL/health" \
            || echo "API health check failed (placeholder image returns 200 / — non-critical)"

      - name: Notify Success
        run: |
          echo "Apply + verify completed: ${{ needs.apply.outputs.container_app_url }}"
